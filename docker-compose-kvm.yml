services:
  spr-simplex:
    extends:
      file: docker-compose.yml
      service: spr-simplex
    image: ghcr.io/spr-networks/spr-simplex:${RELEASE_VERSION:-latest}${RELEASE_CHANNEL:--krun}
    runtime: ${SPR_KRUN_RUNTIME:-spr-krun}
    annotations:
      krun.cpus: "${SPR_KRUN_CPUS:-1}"
      krun.ram_mib: "${SPR_KRUN_RAM_MIB:-128}"
      krun.tap_name: "kruntap0"
      krun.net_uplink: "eth0"
      krun.net_mac: "${SPR_KRUN_MAC:-02:53:50:52:4b:0f}"
      krun.vsock_path: "/state/plugins/spr-simplex/socket"
      krun.vsock_port: "4040"
    environment:
      SPR_KRUN_PLUGIN_SOCKET: "/run/spr-krun-plugin/spr-simplex.sock"
      SPR_KRUN_VSOCK_PORT: "4040"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    devices:
      - "/dev/net/tun:/dev/net/tun"

networks:
  simplexnet:
    name: spr-simplex
    driver_opts:
      com.docker.network.bridge.name: spr-simplex
